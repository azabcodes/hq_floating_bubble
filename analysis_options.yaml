include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-raw-types: true

  exclude:
    - "lib/l10n/**.dart"
    - "build/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"

formatter:
  page_width: 100
  trailing_commas: preserve

linter:
  rules:
    # avoid_print: false
    prefer_single_quotes: true
    unnecessary_string_escapes: false
