name: hq_floating_bubble
description: A customizable Flutter plugin for creating system-level floating overlay windows (bubbles) on Android with magnet snapping and event streams.
version: 0.0.4
homepage: "https://github.com/azabcodes/hq_floating_bubble"

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: hq.floating.bubble
        pluginClass: HQFloatingPlugin
